name: Architecture Boundaries

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dependency-cruiser:
    name: Dependency boundary check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Architecture boundary check
        run: npx dependency-cruiser --validate .dependency-cruiser.js packages/ apps/

  circular-deps:
    name: Circular dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Circular dependency check
        run: npx madge --circular --extensions ts,tsx packages/ apps/
