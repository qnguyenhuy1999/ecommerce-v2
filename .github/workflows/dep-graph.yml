name: Dependency Graph Check

on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/package.json'
      - '.dependency-cruiser.js'

jobs:
  dependency-boundaries:
    name: Circular deps & boundary violations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.0.4'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check circular dependencies (madge)
        run: pnpm lint:circular

      - name: Check dependency boundaries (dependency-cruiser)
        run: pnpm lint:deps
