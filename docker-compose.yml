name: ecommerce

# ─────────────────────────────────────────────────────────────────────────────
# Local-first Docker Compose
#
# Services
#   Infrastructure : postgres, redis, mailpit (SMTP trap)
#   APIs           : api-storefront (:4000), api-seller (:4003), api-admin (:4002)
#   Next.js apps   : storefront (:3000), seller (:3001), admin (:3002)
#
# Usage
#   docker compose up -d                  # start everything
#   docker compose up -d postgres redis   # infra only (for pnpm dev)
#   docker compose logs -f api-seller     # tail a service
#   docker compose down -v                # stop + remove volumes
# ─────────────────────────────────────────────────────────────────────────────

x-node-base: &node-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d ecommerce']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # Mailpit — local SMTP trap + web UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # ── API services ────────────────────────────────────────────────────────────

  api-storefront:
    <<: *node-base
    command: ['node', '--env-file=.env', 'apps/api-storefront/dist/main.js']
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://user:password@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STOREFRONT_API_PORT: 4000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-seller:
    <<: *node-base
    command: ['node', '--env-file=.env', 'apps/api-seller/dist/main.js']
    ports:
      - '4003:4003'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://user:password@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SELLER_API_PORT: 4003
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-admin:
    <<: *node-base
    command: ['node', '--env-file=.env', 'apps/api-admin/dist/main.js']
    ports:
      - '4002:4002'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://user:password@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_API_PORT: 4002
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js frontends ───────────────────────────────────────────────────────

  storefront:
    <<: *node-base
    command: ['node', 'apps/storefront/.next/standalone/apps/storefront/server.js']
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_STOREFRONT_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api-storefront

  seller:
    <<: *node-base
    command: ['node', 'apps/seller/.next/standalone/apps/seller/server.js']
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_SELLER_API_URL: http://localhost:4003
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api-seller

  admin:
    <<: *node-base
    command: ['node', 'apps/admin/.next/standalone/apps/admin/server.js']
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_ADMIN_API_URL: http://localhost:4002
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api-admin

volumes:
  postgres_data:
  redis_data:
