packages:
  - apps/*
  - packages/*
allowBuilds:
  '@nestjs/core': false
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@swc/core': true
  bcrypt: true
  esbuild: false
  msgpackr-extract: false
  msw: false
  prisma: true
  sharp: true

ignoredBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/engines'
  - argon2
  - bcrypt
  - esbuild
  - msgpackr-extract
  - prisma
  - sharp
  - unrs-resolver
